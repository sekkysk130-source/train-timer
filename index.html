<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🚇 เดิน หรือ วิ่ง?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(170deg,#0B0E18,#111827,#0B0E18);font-family:'Sarabun','Noto Sans Thai',sans-serif;color:#E2E8F0;min-height:100vh;min-height:100dvh}
input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(.6)}
.wrap{max-width:440px;margin:0 auto;padding:10px 14px 48px}
.card{background:rgba(18,22,36,0.7);border-radius:14px;border:1px solid rgba(100,116,139,0.07)}
.mono{font-family:'SF Mono','JetBrains Mono','Courier New',monospace}
.tiny{font-size:9px;color:#475569}
.btn{border:none;cursor:pointer;transition:all .2s}
.flash{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;padding:8px 20px;border-radius:10px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#4ADE80;font-size:12px;font-weight:600;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Inline edit modal */
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeUp .25s ease}
.edit-panel{background:#1E293B;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:440px;max-height:70vh;overflow-y:auto}
@keyframes fadeUp{from{opacity:0}to{opacity:1}}

/* Editable time badge */
.time-editable{position:relative;cursor:pointer;border-bottom:1px dashed rgba(148,163,184,0.3)}
.time-editable:hover,.time-editable:active{border-bottom-color:#F59E0B}
.edit-hint{position:absolute;top:-14px;right:0;font-size:8px;color:#F59E0B;opacity:0;transition:opacity .2s}
.time-editable:hover .edit-hint,.time-editable:active .edit-hint{opacity:1}
</style>
</head>
<body>

<div class="wrap" id="app"></div>

<script>
// ============================================================
// UTILS
// ============================================================
const toM=t=>{const[h,m]=t.split(':').map(Number);return h*60+m};
const fM=m=>{const t=((m%1440)+1440)%1440;return`${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`};

function genTrains(first,last,slots){
  const trains=[];const f=toM(first),l=toM(last)+(toM(last)<f?1440:0);let c=f;
  while(c<=l){trains.push(fM(c%1440));let freq=8;for(const s of slots){if((c%1440)>=toM(s.from)&&(c%1440)<toM(s.to)){freq=s.iv;break;}}c+=freq;}
  return[...new Set(trains)].sort((a,b)=>toM(a)-toM(b));
}

function calibrate(gen,anchors,deleted){
  const del=new Set(deleted||[]);
  const base=gen.filter(t=>!del.has(t));
  if(!anchors||!anchors.length)return base;
  const sorted=[...anchors].sort((a,b)=>toM(a.orig)-toM(b.orig));
  const result=[];
  for(const t of base){
    const tm=toM(t);let before=null,after=null;
    for(const a of sorted){if(toM(a.orig)<=tm)before=a;if(toM(a.orig)>=tm&&!after)after=a;}
    let offset=0;
    if(before&&after&&before!==after){const bO=toM(before.orig),aO=toM(after.orig);const bOff=toM(before.real)-bO;const aOff=toM(after.real)-aO;offset=Math.round(bOff+(aOff-bOff)*((tm-bO)/(aO-bO)));}
    else if(before)offset=toM(before.real)-toM(before.orig);
    else if(after)offset=toM(after.real)-toM(after.orig);
    result.push(fM(tm+offset));
  }
  for(const a of sorted){if(!result.includes(a.real))result.push(a.real);}
  return[...new Set(result)].sort((a,b)=>toM(a)-toM(b));
}

function findNext(trains,after){const am=toM(after);for(const t of trains)if(toM(t)>=am)return t;return null;}

// ============================================================
// BASE SCHEDULES
// ============================================================
const BASE={
  purpleToTaoPoon:{weekday:genTrains("05:30","22:56",[{from:"05:30",to:"06:30",iv:7},{from:"06:30",to:"08:30",iv:5},{from:"08:30",to:"09:30",iv:6},{from:"09:30",to:"17:00",iv:7},{from:"17:00",to:"20:00",iv:5},{from:"20:00",to:"21:00",iv:6},{from:"21:00",to:"23:00",iv:10}]),weekend:genTrains("06:00","22:56",[{from:"06:00",to:"23:00",iv:10}])},
  purpleToKBP:{weekday:genTrains("06:00","23:33",[{from:"06:00",to:"06:30",iv:7},{from:"06:30",to:"08:30",iv:5},{from:"08:30",to:"09:30",iv:6},{from:"09:30",to:"17:00",iv:7},{from:"17:00",to:"20:00",iv:5},{from:"20:00",to:"21:00",iv:6},{from:"21:00",to:"23:33",iv:10}]),weekend:genTrains("06:18","23:33",[{from:"06:18",to:"23:33",iv:10}])},
  blueToChatuchak:{weekday:genTrains("05:30","23:30",[{from:"05:30",to:"07:00",iv:5},{from:"07:00",to:"09:00",iv:3},{from:"09:00",to:"09:30",iv:7},{from:"09:30",to:"17:00",iv:5},{from:"17:00",to:"19:30",iv:4},{from:"19:30",to:"21:00",iv:5},{from:"21:00",to:"24:00",iv:8}]),weekend:genTrains("06:00","23:30",[{from:"06:00",to:"10:00",iv:8},{from:"10:00",to:"19:00",iv:7},{from:"19:00",to:"24:00",iv:8}])},
  blueToTaoPoon:{weekday:genTrains("05:30","23:30",[{from:"05:30",to:"07:00",iv:5},{from:"07:00",to:"09:00",iv:3},{from:"09:00",to:"09:30",iv:7},{from:"09:30",to:"17:00",iv:5},{from:"17:00",to:"19:30",iv:4},{from:"19:30",to:"21:00",iv:5},{from:"21:00",to:"24:00",iv:8}]),weekend:genTrains("06:00","23:30",[{from:"06:00",to:"10:00",iv:8},{from:"10:00",to:"19:00",iv:7},{from:"19:00",to:"24:00",iv:8}])},
  greenToChitLom:{weekday:genTrains("05:15","23:50",[{from:"05:15",to:"06:00",iv:6},{from:"06:00",to:"07:00",iv:5},{from:"07:00",to:"09:00",iv:3},{from:"09:00",to:"09:30",iv:4},{from:"09:30",to:"16:00",iv:7},{from:"16:00",to:"17:00",iv:5},{from:"17:00",to:"20:00",iv:3},{from:"20:00",to:"21:00",iv:5},{from:"21:00",to:"22:00",iv:6},{from:"22:00",to:"24:00",iv:8}]),weekend:genTrains("05:55","23:50",[{from:"05:55",to:"08:00",iv:7},{from:"08:00",to:"11:00",iv:6},{from:"11:00",to:"21:00",iv:5},{from:"21:00",to:"24:00",iv:8}])},
  greenToMoChit:{weekday:genTrains("05:31","23:50",[{from:"05:31",to:"06:00",iv:6},{from:"06:00",to:"07:00",iv:5},{from:"07:00",to:"09:00",iv:3},{from:"09:00",to:"09:30",iv:4},{from:"09:30",to:"16:00",iv:7},{from:"16:00",to:"17:00",iv:5},{from:"17:00",to:"20:00",iv:3},{from:"20:00",to:"21:00",iv:5},{from:"21:00",to:"22:00",iv:6},{from:"22:00",to:"24:00",iv:8}]),weekend:genTrains("05:55","23:50",[{from:"05:55",to:"08:00",iv:7},{from:"08:00",to:"11:00",iv:6},{from:"11:00",to:"21:00",iv:5},{from:"21:00",to:"24:00",iv:8}])},
};

const ROUTE={
  work:[{sched:"purpleToTaoPoon",line:"สายสีม่วง",lc:"#8B5CF6",from:"คลองบางไผ่",to:"เตาปูน",travelKey:"purpleTravel"},{xfer:"เตาปูน",walkKey:"walkTaoPoon",nextSched:"blueToChatuchak"},{sched:"blueToChatuchak",line:"สายสีน้ำเงิน",lc:"#2563EB",from:"เตาปูน",to:"จตุจักร",travelKey:"blueTaoPoonChatuchak"},{xfer:"จตุจักร → หมอชิต",walkKey:"walkChatuchakMoChit",nextSched:"greenToChitLom"},{sched:"greenToChitLom",line:"สายสีเขียว",lc:"#16A34A",from:"หมอชิต",to:"ชิดลม",travelKey:"greenMoChitChitLom"}],
  home:[{sched:"greenToMoChit",line:"สายสีเขียว",lc:"#16A34A",from:"ชิดลม",to:"หมอชิต",travelKey:"greenChitLomMoChit"},{xfer:"หมอชิต → จตุจักร",walkKey:"walkChatuchakMoChit",nextSched:"blueToTaoPoon"},{sched:"blueToTaoPoon",line:"สายสีน้ำเงิน",lc:"#2563EB",from:"จตุจักร",to:"เตาปูน",travelKey:"blueChatuchakTaoPoon"},{xfer:"เตาปูน",walkKey:"walkTaoPoon",nextSched:"purpleToKBP"},{sched:"purpleToKBP",line:"สายสีม่วง",lc:"#8B5CF6",from:"เตาปูน",to:"คลองบางไผ่",travelKey:"purpleTravel"}],
};

const DEF_CFG={purpleTravel:33,blueTaoPoonChatuchak:7,blueChatuchakTaoPoon:7,greenMoChitChitLom:15,greenChitLomMoChit:15,walkTaoPoon:4,walkChatuchakMoChit:6};

function statusOf(w){
  if(w<=1)return{text:"วิ่งเลย!!",emoji:"🏃‍♂️💨",color:"#EF4444",bg:"rgba(239,68,68,0.10)",border:"rgba(239,68,68,0.22)"};
  if(w<=3)return{text:"เดินเร็ว!",emoji:"🚶‍♂️💨",color:"#F59E0B",bg:"rgba(245,158,11,0.10)",border:"rgba(245,158,11,0.22)"};
  if(w<=8)return{text:"เดินสบาย",emoji:"🚶",color:"#22C55E",bg:"rgba(34,197,94,0.08)",border:"rgba(34,197,94,0.18)"};
  return{text:"รอชิลๆ",emoji:"☕",color:"#818CF8",bg:"rgba(129,140,248,0.08)",border:"rgba(129,140,248,0.18)"};
}

// ============================================================
// STATE (with localStorage persistence)
// ============================================================
let state={
  time:"06:00",
  dir:"work",
  wknd:false,
  cfg:{...DEF_CFG},
  calib:{}, // {schedKey_dayType: {anchors:[], deleted:[]}}
  editingLeg:null, // index of leg being edited
  showCfg:false,
};

function load(){
  try{const s=localStorage.getItem('bkk-transit-v2');if(s){const d=JSON.parse(s);state.cfg=d.cfg||{...DEF_CFG};state.calib=d.calib||{};}}catch{}
}
function save(){
  try{localStorage.setItem('bkk-transit-v2',JSON.stringify({cfg:state.cfg,calib:state.calib}));}catch{}
}
function flash(msg){
  const el=document.createElement('div');el.className='flash';el.textContent=msg;document.body.appendChild(el);
  setTimeout(()=>el.remove(),1500);
}

load();

// ============================================================
// GET CALIBRATED SCHEDULE
// ============================================================
function getSched(key){
  const dt=state.wknd?'weekend':'weekday';const k=`${key}_${dt}`;
  const base=BASE[key]?.[dt]||[];const data=state.calib[k]||{anchors:[],deleted:[]};
  return calibrate(base,data.anchors,data.deleted);
}

// ============================================================
// CALCULATE
// ============================================================
function calc(){
  const route=ROUTE[state.dir];
  const legs=[];
  let currentTime=state.time;
  let err=null;

  for(let i=0;i<route.length;i++){
    const step=route[i];
    if(step.sched){
      // Train leg
      const trains=getSched(step.sched);
      const train=findNext(trains,currentTime);
      if(!train){err=`ไม่มีรถ${step.line}แล้ว`;break;}
      const wait=toM(train)-toM(currentTime);
      const travel=state.cfg[step.travelKey];
      const arrive=fM(toM(train)+travel);
      legs.push({t:'train',line:step.line,lc:step.lc,from:step.from,to:step.to,atStation:i===0?state.time:undefined,trainTime:train,wait:i===0?wait:undefined,arrive,travel,sched:step.sched});
      currentTime=arrive;
    } else if(step.xfer){
      // Transfer
      const walk=state.cfg[step.walkKey];
      const arriveStation=currentTime;
      const ready=fM(toM(currentTime)+walk);
      const nextTrains=getSched(step.nextSched);
      const nextTrain=findNext(nextTrains,ready);
      if(!nextTrain){err='ไม่มีรถสายต่อไปแล้ว';break;}
      const waitX=toM(nextTrain)-toM(ready);
      legs.push({t:'xfer',station:step.xfer,arriveStation,walk,ready,nextTrain,wait:waitX,status:statusOf(waitX),nextSched:step.nextSched});
      currentTime=ready; // will be overwritten by next train depart
      // Actually the next train departs at nextTrain, so currentTime should be set after boarding
      // But the next loop iteration (train) will findNext from currentTime which we need to set to ready
      // The train step uses findNext which will get nextTrain anyway
    }
  }

  if(err)return{err};
  const total=toM(legs[legs.length-1].arrive)-toM(state.time);
  return{legs,total,dep:state.time,arr:legs[legs.length-1].arrive};
}

// ============================================================
// RENDER
// ============================================================
function render(){
  const result=calc();
  const app=document.getElementById('app');
  const now=new Date();
  const clock=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

  let html=`
  <div style="text-align:center;padding:18px 0 14px">
    <div style="font-size:10px;letter-spacing:5px;color:#475569">BANGKOK TRANSIT</div>
    <h1 style="font-size:24px;font-weight:800;margin:2px 0;background:linear-gradient(135deg,#C4B5FD,#93C5FD,#86EFAC);-webkit-background-clip:text;-webkit-text-fill-color:transparent">🚇 เดิน หรือ วิ่ง?</h1>
    <div style="font-size:10px;color:#475569">คลองบางไผ่ ↔ ชิดลม</div>
    <div style="margin-top:4px;font-size:26px;font-weight:200;color:#94A3B8;font-family:'SF Mono',monospace;letter-spacing:3px" id="clock">${clock}</div>
  </div>

  <!-- Direction -->
  <div style="display:flex;border-radius:12px;overflow:hidden;margin-bottom:10px" class="card">
    <button class="btn" onclick="setDir('work')" style="flex:1;padding:11px;background:${state.dir==='work'?'rgba(99,102,241,0.12)':'transparent'};color:${state.dir==='work'?'#E2E8F0':'#475569'};font-size:13px;font-weight:${state.dir==='work'?700:400}">🏢 ไปทำงาน</button>
    <button class="btn" onclick="setDir('home')" style="flex:1;padding:11px;background:${state.dir==='home'?'rgba(99,102,241,0.12)':'transparent'};color:${state.dir==='home'?'#E2E8F0':'#475569'};font-size:13px;font-weight:${state.dir==='home'?700:400}">🏠 กลับบ้าน</button>
  </div>

  <!-- Day type -->
  <div style="display:flex;gap:6px;margin-bottom:10px">
    <button class="btn" onclick="setWknd(false)" style="flex:1;padding:8px;border-radius:9px;background:${!state.wknd?'rgba(99,102,241,0.12)':'rgba(18,22,36,0.4)'};color:${!state.wknd?'#A5B4FC':'#475569'};font-size:12px;font-weight:${!state.wknd?600:400};border:${!state.wknd?'1px solid rgba(99,102,241,0.18)':'1px solid transparent'}">📅 จันทร์-ศุกร์</button>
    <button class="btn" onclick="setWknd(true)" style="flex:1;padding:8px;border-radius:9px;background:${state.wknd?'rgba(99,102,241,0.12)':'rgba(18,22,36,0.4)'};color:${state.wknd?'#A5B4FC':'#475569'};font-size:12px;font-weight:${state.wknd?600:400};border:${state.wknd?'1px solid rgba(99,102,241,0.18)':'1px solid transparent'}">🗓 เสาร์-อาทิตย์</button>
  </div>

  <!-- Time input -->
  <div class="card" style="padding:14px 16px;margin-bottom:10px">
    <div style="font-size:10px;color:#64748B;letter-spacing:2px;margin-bottom:5px">⏰ เวลาถึงสถานี${state.dir==='work'?'คลองบางไผ่':'ชิดลม'}</div>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="time" value="${state.time}" onchange="setTime(this.value)" style="flex:1;font-size:30px;font-weight:300;padding:5px 12px;background:rgba(11,14,24,0.5);border:1px solid rgba(100,116,139,0.1);border-radius:9px;color:#F1F5F9;outline:none;font-family:'SF Mono',monospace">
      <button class="btn" onclick="useNow()" style="padding:9px 12px;border-radius:9px;border:1px solid rgba(100,116,139,0.1);background:rgba(99,102,241,0.08);color:#A5B4FC;font-size:11px;font-weight:600">ตอนนี้</button>
    </div>
    <div style="display:flex;gap:4px;margin-top:8px;flex-wrap:wrap">
      ${(state.dir==='work'?['05:30','05:45','06:00','06:15','06:30','06:45','07:00','07:30']:['17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30']).map(t=>`
        <button class="btn" onclick="setTime('${t}')" style="padding:4px 10px;border-radius:6px;background:${state.time===t?'rgba(139,92,246,0.18)':'rgba(18,22,36,0.4)'};color:${state.time===t?'#C4B5FD':'#475569'};font-size:11px;font-weight:500">${t}</button>
      `).join('')}
    </div>
  </div>`;

  // Countdown
  const nowM=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  const depM=toM(state.time);
  const diff=depM-nowM;
  if(diff>0&&diff<180){
    const cdM=Math.floor(diff),cdS=Math.floor((diff%1)*60);
    html+=`<div style="background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.12);border-radius:12px;padding:8px 14px;margin-bottom:10px;text-align:center">
      <div style="font-size:9px;color:#FCA5A5;letter-spacing:2px">ออกจากบ้านอีก</div>
      <div style="font-size:28px;font-weight:700;color:#FCA5A5;font-family:monospace">${cdM}:${String(cdS).padStart(2,'0')}</div>
    </div>`;
  }

  if(result.err){
    html+=`<div class="card" style="padding:18px;text-align:center;color:#FCA5A5;font-size:14px;background:rgba(239,68,68,0.08)">⚠️ ${result.err}</div>`;
  } else {
    const trainLegs=result.legs.filter(l=>l.t==='train');
    // Summary
    html+=`<div class="card" style="padding:16px 18px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-end">
        <div><div style="font-size:9px;color:#475569;letter-spacing:2px">รวม</div><div style="font-size:34px;font-weight:800;color:#F1F5F9;line-height:1">${result.total}<span style="font-size:14px;font-weight:400;color:#475569"> นาที</span></div></div>
        <div style="text-align:right"><div style="font-size:10px;color:#475569">ออก ${result.dep}</div><div style="font-size:16px;font-weight:700;color:#4ADE80">ถึง ${result.arr}</div></div>
      </div>
      <div style="display:flex;height:3px;border-radius:2px;overflow:hidden;margin-top:12px;gap:2px">${trainLegs.map(l=>`<div style="flex:${l.travel};background:${l.lc};opacity:0.7"></div>`).join('')}</div>
    </div>`;

    // Legs
    result.legs.forEach((leg,i)=>{
      if(leg.t==='xfer'){
        const s=leg.status;
        html+=`<div style="padding:0 0 0 20px;position:relative">
          <div style="position:absolute;left:4px;top:0;bottom:0;border-left:2px dashed rgba(100,116,139,0.12)"></div>
          <div style="position:absolute;left:-2px;top:12px;width:12px;height:12px;border-radius:50%;background:#0B0E18;border:2px solid #F59E0B;z-index:2"></div>
          <div style="background:${s.bg};border-radius:11px;padding:11px 13px;margin:4px 0;border:1px solid ${s.border}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <span style="font-size:12px;font-weight:700;color:#E2E8F0">🔄 ${leg.station}</span>
              <span style="font-size:17px">${s.emoji}</span>
            </div>
            <div style="display:flex;align-items:center;margin-bottom:8px;background:rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px">
              <div style="flex:1;text-align:center"><div class="tiny">ลงสถานี</div><div class="mono" style="font-size:13px;font-weight:600;color:#CBD5E1">${leg.arriveStation}</div></div>
              <div style="color:#334155;font-size:10px">→</div>
              <div style="flex:1;text-align:center"><div class="tiny">เดิน ${leg.walk} นาที</div><div class="mono" style="font-size:13px;font-weight:600;color:#CBD5E1">${leg.ready}</div></div>
              <div style="color:#334155;font-size:10px">→</div>
              <div style="flex:1;text-align:center"><div class="tiny">รถออก</div>
                <div class="mono time-editable" onclick="openEdit('${leg.nextSched}','${leg.nextTrain}',${i})" style="font-size:14px;font-weight:700;color:#F1F5F9">${leg.nextTrain}<span class="edit-hint">แก้ไข</span></div>
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:14px;font-weight:700;color:${s.color}">${s.text}</span>
              <span style="font-size:11px;color:#94A3B8">รอ <strong style="color:${s.color}">${leg.wait}</strong> นาที</span>
            </div>
          </div>
        </div>`;
      } else {
        html+=`<div style="display:flex">
          <div style="width:10px;display:flex;flex-direction:column;align-items:center">
            <div style="width:10px;height:10px;border-radius:50%;background:${leg.lc};box-shadow:0 0 5px ${leg.lc}35;flex-shrink:0"></div>
            <div style="flex:1;width:2px;background:${leg.lc};opacity:0.35"></div>
            <div style="width:10px;height:10px;border-radius:50%;background:${leg.lc};box-shadow:0 0 5px ${leg.lc}35;flex-shrink:0"></div>
          </div>
          <div style="flex:1;padding-left:10px">
            <div style="display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:5px;background:${leg.lc}12;margin-bottom:5px">
              <div style="width:6px;height:6px;border-radius:50%;background:${leg.lc}"></div>
              <span style="font-size:10px;font-weight:700;color:${leg.lc}">${leg.line}</span>
            </div>
            <div class="card" style="padding:12px 13px;margin-bottom:2px">
              ${leg.atStation!==undefined?`<div style="font-size:10px;color:#94A3B8;margin-bottom:8px;padding:5px 9px;border-radius:7px;background:rgba(99,102,241,0.05)">ถึงสถานี <strong style="color:#E2E8F0">${leg.atStation}</strong>${leg.wait>0?` → รอ <strong style="color:#C4B5FD">${leg.wait} นาที</strong> → รถออก <strong style="color:#F1F5F9">${leg.trainTime}</strong>`:` → รถออกเลย <strong style="color:#4ADE80">${leg.trainTime}</strong>`}</div>`:''}
              <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                <div><div class="tiny">ขึ้นที่</div><div style="font-size:13px;font-weight:700;color:#F1F5F9">${leg.from}</div></div>
                <div style="text-align:right"><div class="tiny">ออก</div>
                  <div class="mono time-editable" onclick="openEdit('${leg.sched}','${leg.trainTime}',${i})" style="font-size:16px;font-weight:700;color:#F1F5F9">${leg.trainTime}<span class="edit-hint">แก้ไข</span></div>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:6px;margin:3px 0"><div style="flex:1;height:1px;background:${leg.lc}20"></div><span style="font-size:9px;color:#475569">🕐 ${leg.travel} นาที</span><div style="flex:1;height:1px;background:${leg.lc}20"></div></div>
              <div style="display:flex;justify-content:space-between;margin-top:6px">
                <div><div class="tiny">ลงที่</div><div style="font-size:13px;font-weight:700;color:#F1F5F9">${leg.to}</div></div>
                <div style="text-align:right"><div class="tiny">ถึง</div><div class="mono" style="font-size:16px;font-weight:700;color:#4ADE80">${leg.arrive}</div></div>
              </div>
            </div>
          </div>
        </div>`;
      }
    });
  }

  // Settings button
  html+=`<div style="margin-top:18px">
    <button class="btn" onclick="toggleCfg()" style="width:100%;padding:10px;border-radius:10px;background:rgba(18,22,36,0.4);border:1px solid rgba(100,116,139,0.06);color:#475569;font-size:11px;display:flex;align-items:center;justify-content:center;gap:5px">⚙️ ${state.showCfg?'ปิด':'แก้ไขเวลาเดินทาง/เดินเปลี่ยนสาย'}</button>`;

  if(state.showCfg){
    html+=`<div style="margin-top:8px" class="card" style="padding:14px 16px">
      <div style="padding:14px 16px">
      <div style="font-size:11px;font-weight:700;color:#C4B5FD;margin-bottom:12px">🚇 เวลานั่งรถ (นาที)</div>`;
    [{k:'purpleTravel',l:'สีม่วง: คลองบางไผ่ ↔ เตาปูน',c:'#8B5CF6'},{k:'blueTaoPoonChatuchak',l:'สีน้ำเงิน: เตาปูน → จตุจักร',c:'#2563EB'},{k:'blueChatuchakTaoPoon',l:'สีน้ำเงิน: จตุจักร → เตาปูน',c:'#2563EB'},{k:'greenMoChitChitLom',l:'สีเขียว: หมอชิต → ชิดลม',c:'#16A34A'},{k:'greenChitLomMoChit',l:'สีเขียว: ชิดลม → หมอชิต',c:'#16A34A'}].forEach(x=>{
      html+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:${x.c};display:block;margin-bottom:2px">${x.l}</label><input type="number" value="${state.cfg[x.k]}" onchange="setCfgVal('${x.k}',this.value)" style="width:100%;padding:6px 9px;border-radius:6px;background:rgba(11,14,24,0.5);border:1px solid rgba(100,116,139,0.08);color:#F1F5F9;font-size:14px;outline:none;box-sizing:border-box"></div>`;
    });
    html+=`<div style="font-size:11px;font-weight:700;color:#FCD34D;margin-top:14px;margin-bottom:12px">🚶 เวลาเดินเปลี่ยนสาย (นาที)</div>`;
    [{k:'walkTaoPoon',l:'เตาปูน: สีม่วง ↔ สีน้ำเงิน'},{k:'walkChatuchakMoChit',l:'จตุจักร ↔ หมอชิต'}].forEach(x=>{
      html+=`<div style="margin-bottom:8px"><label style="font-size:10px;color:#FCD34D;display:block;margin-bottom:2px">${x.l}</label><input type="number" value="${state.cfg[x.k]}" onchange="setCfgVal('${x.k}',this.value)" style="width:100%;padding:6px 9px;border-radius:6px;background:rgba(11,14,24,0.5);border:1px solid rgba(100,116,139,0.08);color:#F1F5F9;font-size:14px;outline:none;box-sizing:border-box"></div>`;
    });
    html+=`<button class="btn" onclick="resetCfg()" style="margin-top:6px;padding:7px 14px;border-radius:7px;background:rgba(239,68,68,0.08);color:#FCA5A5;font-size:10px">🔄 รีเซ็ต</button></div></div>`;
  }

  html+=`</div>
  <div style="text-align:center;margin-top:24px;font-size:9px;color:#334155">
    <div>กดที่เวลารถออก เพื่อแก้ไขให้ตรงกับเวลาจริง 📌</div>
    <div>ข้อมูลบันทึกในมือถือถาวร</div>
  </div>`;

  app.innerHTML=html;
}

// ============================================================
// ACTIONS
// ============================================================
window.setDir=d=>{state.dir=d;render();};
window.setWknd=w=>{state.wknd=w;render();};
window.setTime=t=>{state.time=t;render();};
window.useNow=()=>{const n=new Date();state.time=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;render();};
window.toggleCfg=()=>{state.showCfg=!state.showCfg;render();};
window.setCfgVal=(k,v)=>{state.cfg[k]=Number(v);save();};
window.resetCfg=()=>{state.cfg={...DEF_CFG};save();render();};

// ============================================================
// INLINE EDIT: tap on any departure time to correct it
// ============================================================
window.openEdit=(schedKey,currentTime,legIdx)=>{
  const dt=state.wknd?'weekend':'weekday';
  const k=`${schedKey}_${dt}`;
  const base=BASE[schedKey]?.[dt]||[];
  const data=state.calib[k]||{anchors:[],deleted:[]};
  
  // Find closest original time
  const calibrated=calibrate(base,data.anchors,data.deleted);
  const origIdx=calibrated.indexOf(currentTime);
  
  // Find the original base time that maps to this
  let closestOrig=base[0];
  let minDiff=9999;
  for(const b of base){
    if(data.deleted.includes(b))continue;
    const d=Math.abs(toM(b)-toM(currentTime));
    if(d<minDiff){minDiff=d;closestOrig=b;}
  }

  const overlay=document.createElement('div');
  overlay.className='edit-overlay';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  
  overlay.innerHTML=`
  <div class="edit-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:700;color:#F1F5F9">📌 แก้ไขเวลารถออก</div>
      <button class="btn" onclick="this.closest('.edit-overlay').remove()" style="padding:6px 12px;border-radius:8px;background:rgba(100,116,139,0.1);color:#94A3B8;font-size:12px">✕ ปิด</button>
    </div>
    
    <div style="background:rgba(0,0,0,0.2);border-radius:12px;padding:14px;margin-bottom:16px">
      <div style="font-size:11px;color:#94A3B8;margin-bottom:8px">เวลาในตารางตอนนี้แสดง</div>
      <div class="mono" style="font-size:28px;font-weight:700;color:#F1F5F9;text-align:center">${currentTime}</div>
    </div>
    
    <div style="margin-bottom:16px">
      <div style="font-size:12px;color:#4ADE80;margin-bottom:6px;font-weight:600">ใส่เวลาจริงที่ถูกต้อง:</div>
      <input type="time" id="editRealTime" value="${currentTime}" style="width:100%;font-size:28px;font-weight:300;padding:8px 16px;background:rgba(11,14,24,0.5);border:2px solid rgba(34,197,94,0.3);border-radius:12px;color:#4ADE80;outline:none;font-family:'SF Mono',monospace;text-align:center;box-sizing:border-box">
    </div>
    
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="saveEdit('${schedKey}','${closestOrig}')" style="flex:1;padding:12px;border-radius:10px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#4ADE80;font-size:14px;font-weight:700">📌 บันทึกเวลาจริง</button>
      <button class="btn" onclick="deleteTrainTime('${schedKey}','${closestOrig}')" style="padding:12px 16px;border-radius:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#FCA5A5;font-size:14px;font-weight:700">🗑️ ลบ</button>
    </div>
    
    ${data.anchors.length>0?`
    <div style="margin-top:16px;border-top:1px solid rgba(100,116,139,0.1);padding-top:12px">
      <div style="font-size:10px;color:#64748B;margin-bottom:6px">จุดอ้างอิงที่บันทึกไว้ (เวลาอื่นขยับตาม):</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${data.anchors.map(a=>`<span style="display:inline-flex;align-items:center;gap:3px;padding:4px 8px;border-radius:6px;font-size:11px;background:rgba(34,197,94,0.1);color:#4ADE80;border:1px solid rgba(34,197,94,0.2);font-family:monospace">${a.orig}→${a.real} <button class="btn" onclick="removeAnchor('${schedKey}','${a.orig}')" style="color:#EF4444;font-size:9px;padding:0;background:none">✕</button></span>`).join('')}
      </div>
    </div>`:''}
    
    <div style="margin-top:12px;font-size:10px;color:#475569;text-align:center">
      บันทึกเวลาจริง → เวลาก่อน/หลังขยับตามอัตโนมัติ
    </div>
  </div>`;
  
  document.body.appendChild(overlay);
};

window.saveEdit=(schedKey,origTime)=>{
  const input=document.getElementById('editRealTime');
  if(!input)return;
  const realTime=input.value;
  const dt=state.wknd?'weekend':'weekday';
  const k=`${schedKey}_${dt}`;
  const data=state.calib[k]||{anchors:[],deleted:[]};
  const newAnchors=[...data.anchors.filter(a=>a.orig!==origTime),{orig:origTime,real:realTime}];
  state.calib[k]={...data,anchors:newAnchors};
  save();
  document.querySelector('.edit-overlay')?.remove();
  flash('บันทึกแล้ว ✓ เวลาอื่นขยับตาม');
  render();
};

window.deleteTrainTime=(schedKey,origTime)=>{
  const dt=state.wknd?'weekend':'weekday';
  const k=`${schedKey}_${dt}`;
  const data=state.calib[k]||{anchors:[],deleted:[]};
  state.calib[k]={...data,deleted:[...new Set([...data.deleted,origTime])]};
  save();
  document.querySelector('.edit-overlay')?.remove();
  flash('ลบเวลานี้แล้ว');
  render();
};

window.removeAnchor=(schedKey,origTime)=>{
  const dt=state.wknd?'weekend':'weekday';
  const k=`${schedKey}_${dt}`;
  const data=state.calib[k]||{anchors:[],deleted:[]};
  state.calib[k]={...data,anchors:data.anchors.filter(a=>a.orig!==origTime)}; 
  save();
  flash('ลบจุดอ้างอิงแล้ว');
  render();
};

// ============================================================
// CLOCK & AUTO-REFRESH
// ============================================================
setInterval(()=>{
  const el=document.getElementById('clock');
  if(el){const n=new Date();el.textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;}
},1000);

// Re-render every 30s for countdown
setInterval(render,30000);

// Initial render
render();
</script>
</body>
</html>
